name: Lacrei Saúde API - CI/CD Pipeline

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  DJANGO_SECRET_KEY: 'ci-cd-secret-key-only-for-tests'
  DJANGO_DEBUG: 'True'
  DJANGO_SETTINGS_MODULE: 'core.settings.base'
  DB_NAME: 'lacrei_saude_test'
  DB_USER: 'lacrei_user'
  DB_PASSWORD: 'lacrei_password_test'
  DB_HOST: 'localhost'
  DB_PORT: '5432'

jobs:
  # ==========================================
  # JOB 1: Lint (Qualidade de Código)
  # ==========================================
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Instalar dependências de lint
        run: pip install black isort flake8

      - name: ✅ Verificar formatação (Black)
        run: black --check --diff .

      - name: ✅ Verificar imports (isort)
        run: isort --check-only --diff .

      - name: ✅ Verificar estilo (Flake8)
        run: flake8 .

  # ==========================================
  # JOB 2: Testes Automatizados
  # ==========================================
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lacrei_saude_test
          POSTGRES_USER: lacrei_user
          POSTGRES_PASSWORD: lacrei_password_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Instalar Poetry
        run: |
          pip install poetry==1.8.4
          poetry config virtualenvs.create false

      - name: 📦 Instalar dependências
        run: poetry install --no-interaction --no-ansi

      - name: 🗃️ Executar migrações
        run: python manage.py migrate --noinput

      - name: 🧪 Executar testes com cobertura
        run: |
          coverage run manage.py test apps/ --verbosity=2
          coverage report -m
          coverage xml

      - name: 📊 Upload cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ==========================================
  # JOB 3: Build Docker Image
  # ==========================================
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: docker build -t lacrei-saude-api:${{ github.sha }} .

      - name: ✅ Verificar imagem
        run: |
          docker run --rm --entrypoint python lacrei-saude-api:${{ github.sha }} -c "import django; print(f'Django {django.VERSION} OK')"
          echo "✅ Imagem Docker construída e verificada com sucesso!"

  # ==========================================
  # JOB 4: Deploy Staging
  # ==========================================
  deploy-staging:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging.lacrei-saude.com.br

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔐 Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🔐 Login no Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🐳 Build & Push para ECR (Staging)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: lacrei-saude-api
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:staging
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:staging
          echo "✅ Imagem enviada para ECR: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: 🚀 Deploy para ECS (Staging)
        env:
          CLUSTER: lacrei-cluster-staging
          SERVICE: lacrei-api-staging
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment \
            --query 'service.taskDefinition' \
            --output text
          echo "🚀 Deploy staging iniciado! Aguardando estabilização..."

      - name: ⏳ Aguardar estabilização do serviço
        env:
          CLUSTER: lacrei-cluster-staging
          SERVICE: lacrei-api-staging
        run: |
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services $SERVICE
          echo "✅ Serviço staging estável e saudável!"

      - name: 🏥 Verificar health check
        run: |
          sleep 10
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.lacrei-saude.com.br/api/health/ || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check staging: OK ($HTTP_STATUS)"
          else
            echo "⚠️ Health check staging retornou: $HTTP_STATUS (pode estar inicializando)"
          fi

  # ==========================================
  # JOB 5: Deploy Production (Blue/Green)
  # ==========================================
  deploy-production:
    name: 🏭 Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.lacrei-saude.com.br

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔐 Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🔐 Login no Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🐳 Build & Push para ECR (Production)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: lacrei-saude-api
          IMAGE_TAG: prod-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "✅ Imagem enviada para ECR: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: 🏭 Deploy Blue/Green para ECS (Production)
        env:
          CLUSTER: lacrei-cluster
          SERVICE: lacrei-api
        run: |
          echo "🔵 Iniciando Blue/Green deploy..."
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment \
            --deployment-configuration "maximumPercent=200,minimumHealthyPercent=100" \
            --query 'service.taskDefinition' \
            --output text
          echo "🚀 Deploy produção iniciado!"

      - name: ⏳ Aguardar Blue/Green completo
        env:
          CLUSTER: lacrei-cluster
          SERVICE: lacrei-api
        run: |
          echo "⏳ Aguardando nova versão (Green) ficar saudável..."
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services $SERVICE
          echo "✅ Blue/Green deploy concluído! Tráfego migrado para nova versão."

      - name: 🏥 Verificar health check de produção
        run: |
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.lacrei-saude.com.br/api/health/ || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check produção: OK ($HTTP_STATUS)"
            RESPONSE=$(curl -s https://api.lacrei-saude.com.br/api/health/)
            echo "📊 Resposta: $RESPONSE"
          else
            echo "❌ Health check produção falhou: $HTTP_STATUS"
            echo "🔄 Considere rollback manual via: aws ecs update-service --cluster lacrei-cluster --service lacrei-api --force-new-deployment"
            exit 1
          fi
